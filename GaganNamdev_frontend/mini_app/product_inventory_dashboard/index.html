<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Product Inventory Dashboard</h1>
    </header>

    <!-- Controls -->
    <section class="controls">
        <input type="text" id="searchInput" placeholder="Search product...">

        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <select id="sortOption">
            <option value="">Sort</option>
            <option value="low">Price Low → High</option>
            <option value="high">Price High → Low</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
        </select>

        <button id="lowStockBtn">Low Stock</button>
    </section>

    <!-- Analytics -->
    <section class="analytics">
        <div>Total Products: <span id="totalProducts"></span></div>
        <div>Total Value: ₹<span id="totalValue"></span></div>
        <div>Out of Stock: <span id="outOfStock"></span></div>
    </section>

    <!-- Loading -->
    <p id="loading">Loading products...</p>

    <!-- Product Grid -->
    <section id="productContainer" class="grid"></section>

    <!-- Add Product -->
    <section class="form-section">
        <h2>Add Product</h2>

        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="stock" placeholder="Stock">

        <select id="category">
            <option value="">Select Category</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <button onclick="addProduct()">Add Product</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
